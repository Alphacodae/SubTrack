{% extends 'base.html' %}
{% block title %}Add Plan{% endblock %}

{% block content %}
<div class="d-flex align-items-center gap-3 mb-4">
    <a href="{{ url_for('plans') }}" class="btn btn-outline-secondary btn-sm">
        <i class="bi bi-arrow-left"></i> Back
    </a>
    <div class="page-header mb-0">Add Plan</div>
</div>

<div class="card p-4" style="max-width: 600px;">
    <form method="POST">
        <div class="row g-3">
            <div class="col-12">
                <label class="form-label">Plan Name</label>
                <input type="text" name="plan_name" class="form-control" placeholder="e.g. Premium Plan" required>
            </div>
            <div class="col-md-6">
                <label class="form-label">Price (₹)</label>
                <input type="number" name="price" class="form-control" min="1" step="0.01" required>
            </div>
            <div class="col-md-6">
                <label class="form-label">Billing Cycle</label>
                <select name="billing_cycle" class="form-select" required>
                    <option value="Monthly">Monthly</option>
                    <option value="Quarterly">Quarterly</option>
                    <option value="Yearly">Yearly</option>
                </select>
            </div>
            <div class="col-12 mt-2">
                <button type="submit" class="btn btn-danger w-100">
                    <i class="bi bi-plus-lg me-1"></i> Add Plan
                </button>
            </div>
        </div>
    </form>
</div>
{% endblock %}
