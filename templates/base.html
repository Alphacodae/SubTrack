<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SBDMS — {% block title %}Dashboard{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .sidebar {
            min-height: 100vh;
            background: #1a1a2e;
            width: 240px;
            position: fixed;
            top: 0; left: 0;
            padding-top: 20px;
        }
        .sidebar .brand {
            color: #e94560;
            font-size: 20px;
            font-weight: 700;
            padding: 16px 24px;
            border-bottom: 1px solid #ffffff18;
            margin-bottom: 12px;
        }
        .sidebar a {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #ffffffaa;
            text-decoration: none;
            padding: 12px 24px;
            font-size: 14px;
            transition: all 0.2s;
        }
        .sidebar a:hover, .sidebar a.active {
            background: #e9456020;
            color: #ffffff;
            border-left: 3px solid #e94560;
        }
        .sidebar a i { font-size: 16px; }
        .main-content {
            margin-left: 240px;
            padding: 30px;
        }
        .page-header {
            font-size: 24px;
            font-weight: 600;
            color: #1a1a2e;
            margin-bottom: 24px;
        }
        .stat-card {
            background: white;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
        .stat-card .label {
            font-size: 13px;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .stat-card .value {
            font-size: 32px;
            font-weight: 700;
            color: #1a1a2e;
            margin-top: 4px;
        }
        .stat-card .icon {
            font-size: 28px;
            opacity: 0.15;
        }
        .card {
            border: none;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
        .table th {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #888;
            border-bottom: 2px solid #f0f0f0;
        }
        .badge-active { background:#e8f5e9; color:#2e7d32; }
        .badge-expired { background:#fce4ec; color:#c62828; }
        .badge-pending { background:#fff8e1; color:#f57f17; }
        .badge-paid { background:#e8f5e9; color:#2e7d32; }
        .alert-expiry {
            background: #fff3cd;
            border-left: 4px solid #ffc107;
            border-radius: 8px;
            padding: 12px 16px;
            margin-bottom: 8px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <!-- Sidebar -->
    <div class="sidebar">
        <div class="brand">
            <i class="bi bi-layers-fill"></i> SBDMS
        </div>
        <a href="{{ url_for('dashboard') }}" class="{{ 'active' if request.endpoint == 'dashboard' }}">
            <i class="bi bi-speedometer2"></i> Dashboard
        </a>
        <a href="{{ url_for('subscribers') }}" class="{{ 'active' if request.endpoint == 'subscribers' }}">
            <i class="bi bi-people-fill"></i> Subscribers
        </a>
        <a href="{{ url_for('plans') }}" class="{{ 'active' if request.endpoint == 'plans' }}">
            <i class="bi bi-grid-fill"></i> Plans
        </a>
        <a href="{{ url_for('subscriptions') }}" class="{{ 'active' if request.endpoint == 'subscriptions' }}">
            <i class="bi bi-card-checklist"></i> Subscriptions
        </a>
        <a href="{{ url_for('payments') }}" class="{{ 'active' if request.endpoint == 'payments' }}">
            <i class="bi bi-cash-stack"></i> Payments
        </a>
    </div>

    <!-- Main Content -->
    <div class="main-content">
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ 'success' if category == 'success' else 'info' }} alert-dismissible fade show" role="alert">
                        {{ message }}
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}
        {% block content %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
